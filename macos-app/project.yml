name: WhisperClone

options:
  bundleIdPrefix: com.aaryanpurohit
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    MARKETING_VERSION: "1.0.8"
    CURRENT_PROJECT_VERSION: "8"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  WhisperClone:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "*.plist"
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aaryanpurohit.whisper-clone
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/WhisperClone.entitlements
        CODE_SIGN_STYLE: Automatic
